<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Countdown Timer</title>
    <style>
        body{
            text-align: center;
        }
        #p1{
            font-size: 5rem;
            font-family: Arial;
            font-weight: bold;
            margin-top: 10px;
            color:blue;
        }
    </style>
</head>
<body>
    <p id="p1">10</p>

    <script>
        let count1=10;
        const p1=document.getElementById("p1");

        const interval1=setInterval(
            function timer1(){
                count1--;
                p1.textContent=count1.toString();
                if(count1==0){
                    clearInterval(interval1);
                }
            },
            1000
        )
    </script>
</body>
</html>
